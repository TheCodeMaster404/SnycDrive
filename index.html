<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Drive | Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Stlye.css">
    <style>
        /* ================= GLOBAL & LAYOUT ================= */
        *{ margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
        body{
            height:100vh; color:#fff; overflow:hidden; display:flex; align-items:center; justify-content:center;
            background: linear-gradient(rgba(10,25,45,0.85), rgba(10,25,45,0.95)),
                        url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center center/cover;
        }
        .glass{ background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        /* Login */
        .login-container{ width:400px; padding:40px; text-align:center; }
        .logo-circle{ width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:40px; }
        .input-group{ margin-bottom:20px; text-align:left; }
        .input-group input{ width:100%; padding:12px; margin-top:6px; border-radius:10px; border:none; background:rgba(255,255,255,0.12); color:#fff; outline:none; }
        .password-wrapper{ position:relative; }
        .password-wrapper span{ position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; }
        .btn{ width:100%; padding:12px; border:none; border-radius:12px; background: linear-gradient(90deg,#2d7fff,#1b5edb); color:#fff; cursor:pointer; font-weight:500; }

        /* Dashboard */
        .dashboard{ display:none; width:95%; height:90%; padding:30px; }
        .top-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .search-bar input{ width:250px; padding:10px 15px; border-radius:20px; border:none; background:rgba(255,255,255,0.12); color:#fff; outline:none; }
        .content-area{ display:flex; gap:30px; height:calc(100% - 100px); }
        .left-panel{ width:260px; padding:20px; overflow-y: auto; }
        .main-content{ flex:1; padding:20px; overflow-y: auto; }
        .app-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap:20px; }
        .app-card{ height:140px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:10px; cursor:pointer; transition: 0.3s; }
        .app-card:hover{ transform: translateY(-5px); background: rgba(255,255,255,0.15); }
        
        /* Stats Styling */
        .stat-line { display: flex; justify-content: space-between; font-size: 11px; margin-top: 8px; color: #cfd8ff; }
        .stat-line b { color: #fff; }
        #quickNotes{ width:100%; height:80px; background:rgba(0,0,0,0.2); border:none; color:#fff; padding:10px; border-radius:10px; resize:none; outline:none; font-size:11px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="glass login-container" id="loginPage">
    <div class="logo-circle">☁️</div>
    <h2>Sync Drive</h2>
    <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter Username">
    </div>
    <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter Password">
            <span id="togglePassword">👁️</span>
        </div>
    </div>
    <button class="btn" onclick="showDashboard()">Login</button>
</div>

<div class="glass dashboard" id="dashboard">
    <div class="top-bar">
        <div>
            <div id="clock" style="font-size:24px; font-weight:600;"></div>
            <div id="date" style="font-size:12px; color:#cfd8ff;"></div>
        </div>
        
        <div style="display:flex; align-items:center; gap:20px;">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search files..." oninput="filterFiles()">
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="avatar" id="avatar" style="width:40px; height:40px; background:rgba(255,255,255,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center;">👤</div>
                <div>
                    <span id="loggedUser" style="display:block; font-weight:500;"></span>
                    <small onclick="logout()" style="color:#ff4d4d; cursor:pointer;">Logout</small>
                </div>
            </div>
        </div>
    </div>

    <div class="content-area">
        <div class="glass left-panel">
            <h4 style="margin-bottom:15px;">Storage</h4>
            <div class="circle" id="storageCircle">
                <span id="storagePercent">0%</span>
            </div>
            <p id="storageText" style="font-size:12px; text-align:center; margin-top:10px;">0GB / 100GB</p>
            
            <hr style="opacity: 0.1; margin: 20px 0;">
            <h4 style="margin-bottom:10px;">System Stats</h4>
            <div class="stat-line"><span>Total Files:</span> <b id="statFiles">0</b></div>
            <div class="stat-line"><span>Health:</span> <b id="statHealth">Good</b></div>
            <div class="stat-line"><span>Last Login:</span> <b id="statLogin">--</b></div>

            <h4 style="margin-top:25px; margin-bottom:5px;">Notes</h4>
            <textarea id="quickNotes" placeholder="Autosave notes..."></textarea>
        </div>

        <div class="main-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3>My Files</h3>
                <button class="btn" style="width:auto; padding:8px 20px;" onclick="document.getElementById('fileInput').click()">+ Upload</button>
                <input type="file" id="fileInput" multiple style="display:none" onchange="handleFileUpload(this)">
            </div>
            
            <div id="fileList" class="app-grid"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
